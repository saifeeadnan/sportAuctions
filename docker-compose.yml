services:
  postgres:
    image: postgres:16
    container_name: sports-auction-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sportauction
    ports:
      - "5432:5432"
    volumes:
      - sports-auction-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  sports-auction-pgdata:
